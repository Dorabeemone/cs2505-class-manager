<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - CS2505</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
<script src="https://unpkg.com/element-plus"></script>
<script src="js/auth.js"></script>
<style>
:root { --primary:#667eea; --secondary:#764ba2; }
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'PingFang SC','Microsoft YaHei',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#e8ecf4,#dce2f0 40%,#c8d6e5);
  overflow:hidden;
}
.bg-orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.25;pointer-events:none;z-index:0}
.bg-orb:nth-child(1){width:350px;height:350px;background:#4facfe;top:-100px;left:-80px;animation:orb1 15s ease-in-out infinite}
.bg-orb:nth-child(2){width:280px;height:280px;background:#f093fb;bottom:-80px;right:-60px;animation:orb2 18s ease-in-out infinite}
@keyframes orb1{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,40px)}}
@keyframes orb2{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,-60px)}}

#app{position:relative;z-index:1;width:92%;max-width:420px;animation:up .6s ease-out}
@keyframes up{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

.card{
  background:rgba(255,255,255,.92);border-radius:24px;padding:40px 30px 30px;
  box-shadow:0 20px 60px rgba(0,0,0,.1);text-align:center;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.card .icon{font-size:50px;margin-bottom:6px}
.card h1{font-size:1.5rem;font-weight:800;color:#2c3e50;margin-bottom:4px}
.card .sub{font-size:.84rem;color:#909399;margin-bottom:20px}

.card :deep(.el-tabs__nav){width:100%;display:flex}
.card :deep(.el-tabs__item){flex:1;font-weight:700}
.card :deep(.el-input){margin-bottom:14px}
.card :deep(.el-input__wrapper){border-radius:12px}

.btn-main{
  width:100%;height:44px;border-radius:12px;font-weight:700;font-size:.95rem;
  background:linear-gradient(135deg,#667eea,#764ba2);border:none;color:#fff;
  box-shadow:0 6px 20px rgba(102,126,234,.35);
}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(102,126,234,.5)}

.btn-green{
  width:100%;height:44px;border-radius:12px;font-weight:700;font-size:.95rem;
  background:linear-gradient(135deg,#67C23A,#85CE61);border:none;color:#fff;
  box-shadow:0 6px 20px rgba(103,194,58,.35);
}

.err{color:#F56C6C;font-size:.82rem;margin-top:10px}
.ok{color:#67C23A;font-size:.82rem;margin-top:10px}
.back{display:block;text-align:center;margin-top:18px;color:#909399;text-decoration:none;font-size:.85rem}
.back:hover{color:#667eea}

@media(max-width:480px){.card{padding:30px 18px 24px;border-radius:20px}}
</style>
</head>
<body>
<div class="bg-orb"></div><div class="bg-orb"></div>

<div id="app">
  <!-- Already logged in -->
  <div v-if="AuthState.user" class="card">
    <div class="icon">&#x2705;</div>
    <h1>您已登录</h1>
    <p style="color:#606266;margin:8px 0;">{{ AuthState.user.email }}</p>
    <p style="color:#909399;font-size:.82rem;">继续前往目标页面</p>
    <a :href="goto" style="text-decoration:none;">
      <el-button class="btn-main" size="large" style="margin-top:16px;">前往目标页面 &#8594;</el-button>
    </a>
    <a href="index.html" class="back">&#8592; 返回主页</a>
  </div>

  <!-- Login/Register form -->
  <div v-else class="card">
    <div class="icon">&#x1F510;</div>
    <h1>CS2505 班级系统</h1>
    <p class="sub">{{ tab==='login'?'登录您的账号':'创建新账号' }}</p>

    <el-tabs v-model="tab" stretch>
      <el-tab-pane label="登 录" name="login">
        <el-input v-model="loginEmail" placeholder="邮箱地址" size="large" clearable />
        <el-input v-model="loginPwd" placeholder="密码" show-password size="large" @keyup.enter="doLogin" />
        <el-button class="btn-main" :loading="busy" @click="doLogin">登 录</el-button>
        <p v-if="error" class="err">{{ error }}</p>
      </el-tab-pane>
      <el-tab-pane label="注 册" name="register">
        <el-input v-model="regEmail" placeholder="邮箱地址" size="large" clearable />
        <el-input v-model="regPwd" placeholder="密码（至少6位）" show-password size="large" @keyup.enter="doRegister" />
        <el-button class="btn-green" :loading="busy" @click="doRegister">注册并登录</el-button>
        <p v-if="error" class="err">{{ error }}</p>
        <p v-if="done" class="ok">&#x2705; 注册成功，正在跳转...</p>
      </el-tab-pane>
    </el-tabs>

    <a href="index.html" class="back">&#8592; 返回主页</a>
  </div>
</div>

<script>
(function(){
  var app = Vue.createApp({
    setup: function(){
      var validPages = ['index.html','ddl.html','admin.html','recruit.html','announce.html'];
      var redirect = new URLSearchParams(location.search).get('redirect') || 'index.html';
      if (validPages.indexOf(redirect) === -1) redirect = 'index.html';

      var tab = Vue.ref('login');
      var busy = Vue.ref(false);
      var error = Vue.ref('');
      var loginEmail = Vue.ref('');
      var loginPwd = Vue.ref('');
      var regEmail = Vue.ref('');
      var regPwd = Vue.ref('');
      var done = Vue.ref(false);

      var doLogin = function(){
        if (!loginEmail.value || !loginPwd.value){ error.value='请输入邮箱和密码'; return; }
        busy.value = true; error.value = '';
        AuthActions.login(loginEmail.value, loginPwd.value).then(function(){
          location.href = redirect;
        }).catch(function(e){
          error.value = e.message || '登录失败';
        }).finally(function(){ busy.value = false; });
      };

      var doRegister = function(){
        if (!regEmail.value || !regPwd.value){ error.value='请输入邮箱和密码'; return; }
        if (regPwd.value.length < 6){ error.value='密码至少需要6位'; return; }
        busy.value = true; error.value = ''; done.value = false;
        AuthActions.register(regEmail.value, regPwd.value).then(function(){
          done.value = true;
          setTimeout(function(){ location.href = redirect; }, 800);
        }).catch(function(e){
          error.value = e.message || '注册失败';
        }).finally(function(){ busy.value = false; });
      };

      return {
        tab:tab, busy:busy, error:error,
        loginEmail:loginEmail, loginPwd:loginPwd,
        regEmail:regEmail, regPwd:regPwd, done:done,
        goto:redirect, doLogin:doLogin, doRegister:doRegister,
        AuthState: window.AuthState
      };
    }
  });
  app.use(ElementPlus);
  app.mount('#app');
})();
</script>
</body>
</html>
