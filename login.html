<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - CS2505 班级系统</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/element-plus"></script>
  <script src="js/auth.js"></script>
  <style>
    :root {
      --primary: #667eea; --primary-dark: #5a6fd6; --secondary: #764ba2;
      --accent-1: #f093fb; --accent-2: #4facfe;
      --bg-start: #e8ecf4; --bg-mid: #dce2f0; --bg-end: #c8d6e5;
    }
    * { box-sizing: border-box; margin:0; padding:0; }

    body {
      font-family: 'PingFang SC','Microsoft YaHei',-apple-system,BlinkMacSystemFont,sans-serif;
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-mid) 40%, var(--bg-end) 100%);
      overflow: hidden; position: relative;
    }

    .bg-orbs { position:fixed; inset:0; pointer-events:none; z-index:0; }
    .orb { position:absolute; border-radius:50%; filter:blur(60px); opacity:0.3; animation:float 12s ease-in-out infinite; }
    .orb:nth-child(1){width:300px;height:300px;background:var(--accent-2);top:-80px;left:-60px;}
    .orb:nth-child(2){width:250px;height:250px;background:var(--accent-1);bottom:-60px;right:-50px;animation-delay:-4s;}
    .orb:nth-child(3){width:180px;height:180px;background:var(--primary);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-8s;opacity:0.2;}
    @keyframes float {
      0%,100%{transform:translate(0,0) scale(1);}
      25%{transform:translate(30px,-25px) scale(1.08);}
      50%{transform:translate(-15px,20px) scale(0.94);}
      75%{transform:translate(-25px,-15px) scale(1.04);}
    }

    #app { position:relative; z-index:1; width:90%; max-width:440px; animation:fadeInUp 0.7s ease-out; }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(30px);} to{opacity:1;transform:translateY(0);} }

    .card {
      background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-radius: 28px; padding: 44px 36px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1), 0 0 0 1px rgba(255,255,255,0.5);
      text-align: center;
    }
    .card .logo { font-size: 52px; margin-bottom: 6px; animation: bounce 2s ease-in-out infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
    .card h1 {
      font-size: 1.6rem; font-weight: 800; letter-spacing: 1px; margin-bottom: 2px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .card .subtitle { font-size: 0.84rem; color: #909399; margin-bottom: 24px; }

    /* Tabs override */
    .card .el-tabs__nav { width:100%; display:flex; }
    .card .el-tabs__item { flex:1; text-align:center; font-weight:700; font-size:0.9rem; }
    .card .el-tabs__active-bar { background: linear-gradient(90deg, var(--primary), var(--secondary)) !important; height:3px !important; border-radius:2px; }
    .card .el-tabs__item.is-active { color: var(--primary) !important; }

    .card .el-input { margin-bottom: 14px; }
    .card .el-input__wrapper { border-radius: 12px !important; box-shadow: 0 1px 4px rgba(0,0,0,0.04) !important; }
    .card .el-input__wrapper:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08) !important; }

    .card .el-button { width:100%; border-radius: 14px !important; font-weight:700 !important; height:46px !important; font-size:0.95rem !important; letter-spacing:1px; }
    .btn-login {
      background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
      border: none !important; color: white !important;
      box-shadow: 0 6px 20px rgba(102,126,234,0.35) !important;
      transition: all 0.3s ease !important;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(102,126,234,0.5) !important; }
    .btn-register {
      background: linear-gradient(135deg, #67C23A, #85CE61) !important;
      border: none !important; color: white !important;
      box-shadow: 0 6px 20px rgba(103,194,58,0.35) !important;
    }
    .btn-register:hover { transform: translateY(-2px); }

    .error-msg { color:#F56C6C; font-size:0.82rem; margin-top:10px; text-align:center; }
    .success-msg { color:#67C23A; font-size:0.82rem; margin-top:10px; text-align:center; }

    .back-link {
      display:flex; align-items:center; justify-content:center; gap:4px;
      margin-top:18px; color:#7f8c8d; text-decoration:none;
      font-size:0.85rem; font-weight:500; transition:color 0.2s;
    }
    .back-link:hover { color: var(--primary); }

    .already-card { text-align:center; padding:48px 36px 36px; }
    .already-card .check { font-size:64px; margin-bottom:12px; animation: bounce 1.5s ease-in-out infinite; }
    .already-card h2 { font-size:1.3rem; font-weight:700; color:#2c3e50; margin-bottom:6px; }
    .already-card p { font-size:0.9rem; color:#606266; margin-bottom:4px; }

    @media (max-width:480px) {
      .card { padding:30px 20px 24px; border-radius:22px; }
      .orb { display:none; }
    }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb"></div><div class="orb"></div><div class="orb"></div>
  </div>

  <div id="app">
    <!-- Already Logged In -->
    <div v-if="isAlreadyLoggedIn" class="card already-card">
      <div class="check">✅</div>
      <h2>您已登录</h2>
      <p>当前账号：<strong>{{ currentUserEmail }}</strong></p>
      <p style="font-size:0.82rem;color:#909399;">继续前往目标页面即可</p>
      <a :href="redirect" style="text-decoration:none;">
        <el-button type="primary" size="large" class="btn-login" style="margin-top:16px;">前往目标页面 →</el-button>
      </a>
      <br>
      <a href="index.html" class="back-link">← 返回主页</a>
    </div>

    <!-- Login / Register -->
    <div v-else class="card">
      <div class="logo">🔐</div>
      <h1>CS2505 班级系统</h1>
      <p class="subtitle">{{ authTab === 'login' ? '登录您的账号' : '创建新账号' }}</p>

      <el-tabs v-model="authTab" stretch>
        <el-tab-pane label="登 录" name="login">
          <el-input v-model="loginEmail" placeholder="邮箱地址" size="large" clearable>
            <template #prefix>📧</template>
          </el-input>
          <el-input v-model="loginPwd" placeholder="密码" show-password size="large" @keyup.enter="doLogin">
            <template #prefix>🔒</template>
          </el-input>
          <el-button class="btn-login" @click="doLogin" :loading="authBusy" size="large">
            登 录
          </el-button>
          <p v-if="authError" class="error-msg">{{ authError }}</p>
        </el-tab-pane>

        <el-tab-pane label="注 册" name="register">
          <el-input v-model="regEmail" placeholder="邮箱地址" size="large" clearable>
            <template #prefix>📧</template>
          </el-input>
          <el-input v-model="regPwd" placeholder="密码（至少6位）" show-password size="large" @keyup.enter="doRegister">
            <template #prefix>🔒</template>
          </el-input>
          <el-button class="btn-register" @click="doRegister" :loading="authBusy" size="large">
            注 册 并 登 录
          </el-button>
          <p v-if="authError" class="error-msg">{{ authError }}</p>
          <p v-if="regSuccess" class="success-msg">✅ 注册成功，正在跳转...</p>
        </el-tab-pane>
      </el-tabs>

      <a href="index.html" class="back-link">← 返回主页</a>
    </div>
  </div>

  <script>
    const { createApp, ref, computed } = Vue;
    createApp({
      setup() {
        const urlParams = new URLSearchParams(window.location.search);
        let redirectTo = urlParams.get('redirect') || 'index.html';
        if (redirectTo === 'login.html') redirectTo = 'index.html';

        const authTab = ref('login');
        const authBusy = ref(false);
        const authError = ref('');
        const loginEmail = ref('');
        const loginPwd = ref('');
        const regEmail = ref('');
        const regPwd = ref('');
        const regSuccess = ref(false);

        const isAlreadyLoggedIn = computed(() => !!AuthState.user);
        const currentUserEmail = computed(() => AuthState.user?.email || '');

        const doLogin = async () => {
          if (!loginEmail.value || !loginPwd.value) { authError.value = '请输入邮箱和密码'; return; }
          authBusy.value = true; authError.value = '';
          try {
            await AuthActions.login(loginEmail.value, loginPwd.value);
            window.location.href = redirectTo;
          } catch (e) {
            authError.value = e.message || '登录失败';
          } finally { authBusy.value = false; }
        };

        const doRegister = async () => {
          if (!regEmail.value || !regPwd.value) { authError.value = '请输入邮箱和密码'; return; }
          if (regPwd.value.length < 6) { authError.value = '密码至少需要6位'; return; }
          authBusy.value = true; authError.value = ''; regSuccess.value = false;
          try {
            await AuthActions.register(regEmail.value, regPwd.value);
            regSuccess.value = true;
            setTimeout(() => { window.location.href = redirectTo; }, 800);
          } catch (e) {
            authError.value = e.message || '注册失败';
          } finally { authBusy.value = false; }
        };

        return {
          authTab, authBusy, authError,
          loginEmail, loginPwd, regEmail, regPwd, regSuccess,
          isAlreadyLoggedIn, currentUserEmail, redirect: redirectTo,
          doLogin, doRegister
        };
      }
    }).use(ElementPlus).mount('#app');
  </script>
</body>
</html>
