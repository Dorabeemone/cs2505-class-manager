<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS2505 班级主页</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
<script src="https://unpkg.com/element-plus"></script>
<script src="js/auth.js"></script>
<style>
:root{--primary:#667eea;--secondary:#764ba2;--accent1:#f093fb;--accent2:#4facfe}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'PingFang SC','Microsoft YaHei',sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#e8ecf4,#dce2f0 40%,#c8d6e5);
  overflow-x:hidden;overflow-y:auto;
}
/* === Navbar === */
.navbar{
  position:fixed;top:0;left:0;right:0;z-index:100;height:54px;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 24px;
  background:rgba(255,255,255,.65);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.6);
}
.nav-logo a{
  font-weight:800;font-size:1.05rem;text-decoration:none;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.nav-right{display:flex;align-items:center;gap:10px;font-size:.85rem}
.nav-user{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.85);padding:5px 14px;border-radius:20px;font-size:.82rem;color:#2c3e50}
.nav-login{
  background:linear-gradient(135deg,var(--primary),var(--secondary));border:none;color:#fff!important;
  padding:8px 22px;border-radius:20px;font-weight:700;font-size:.85rem;
  box-shadow:0 4px 14px rgba(102,126,234,.35);cursor:pointer;text-decoration:none;
  transition:all .3s;display:inline-block;
}
.nav-login:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(102,126,234,.5)}
/* === Main === */
.main-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:70px 20px 40px}
.container{max-width:640px;width:100%;text-align:center;animation:up .8s ease-out}
@keyframes up{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.logo{font-size:52px;margin-bottom:6px;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
h1{font-size:2.4rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px}
.subtitle{color:#7f8c8d;font-size:.95rem;margin-top:4px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:28px}
.card{
  background:rgba(255,255,255,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-radius:22px;padding:28px 16px 24px;text-decoration:none;color:#2c3e50;
  box-shadow:0 8px 32px rgba(0,0,0,.06);transition:all .35s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;align-items:center;border:1px solid rgba(255,255,255,.6);
}
.card:hover{transform:translateY(-6px);box-shadow:0 16px 48px rgba(0,0,0,.1);border-color:rgba(102,126,234,.25)}
.icon-wrap{width:64px;height:64px;border-radius:18px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:32px}
.card:nth-child(1) .icon-wrap{background:linear-gradient(135deg,#e0f2fe,#bae6fd)}
.card:nth-child(2) .icon-wrap{background:linear-gradient(135deg,#fef3c7,#fde68a)}
.card:nth-child(3) .icon-wrap{background:linear-gradient(135deg,#ede9fe,#c4b5fd)}
.card:nth-child(4) .icon-wrap{background:linear-gradient(135deg,#fce7f3,#f9a8d4)}
.label{font-size:1.1rem;font-weight:700}
.desc{font-size:.78rem;color:#7f8c8d;margin-top:4px}
.footer-note{margin-top:24px;padding:8px 18px;display:inline-block;background:rgba(255,255,255,.5);backdrop-filter:blur(8px);border-radius:20px;color:#7f8c8d;font-size:.8rem}
@media(max-width:480px){
  h1{font-size:1.8rem}.grid{gap:12px}.card{padding:20px 10px 18px;border-radius:18px}
  .icon-wrap{width:48px;height:48px;font-size:24px;border-radius:14px}
  .navbar{padding:0 14px}
}
</style>
</head>
<body>

<div id="app">
  <!-- Navbar -->
  <div class="navbar">
    <div class="nav-logo"><a href="index.html">CS2505 班级主页</a></div>
    <div class="nav-right">
      <template v-if="AuthState.user">
        <span class="nav-user">&#x1F464; {{ AuthState.user.email }}<el-tag v-if="AuthState.user.is_admin" size="small" type="warning" effect="plain" style="margin-left:4px;">管理员</el-tag></span>
        <el-button size="small" text @click="logout">退出</el-button>
      </template>
      <template v-else>
        <a href="login.html?redirect=index.html" class="nav-login">&#x1F511; 登录 / 注册</a>
      </template>
    </div>
  </div>

  <!-- Main content -->
  <div class="main-wrap">
    <div class="container">
      <div class="logo">&#x1F4CB;</div>
      <h1>CS2505 班级主页</h1>
      <p class="subtitle">信息汇聚 &#183; 高效协作</p>
      <div class="grid">
        <a href="ddl.html" class="card"><div class="icon-wrap">&#x1F4CC;</div><span class="label">DDL 任务</span><span class="desc">追踪班级任务进度</span></a>
        <a href="recruit.html" class="card"><div class="icon-wrap">&#x1F4E2;</div><span class="label">信息库</span><span class="desc">招募与活动信息</span></a>
        <a href="announce.html" class="card"><div class="icon-wrap">&#x1F4F0;</div><span class="label">班级公示</span><span class="desc">活动记录与推文</span></a>
        <a href="admin.html" class="card"><div class="icon-wrap">&#x2699;&#xFE0F;</div><span class="label">管理后台</span><span class="desc">内容发布与管理</span></a>
      </div>
      <div class="footer-note">&#x1F7E2; 标记完成任务需登录 &#183; 管理员拥有全部权限</div>
    </div>
  </div>
</div>

<script>
(function(){
  var app = Vue.createApp({
    setup: function(){
      var logout = function(){
        AuthActions.logout();
        ElementPlus.ElMessage.success('已退出登录');
      };
      return { AuthState: window.AuthState, logout: logout };
    }
  });
  app.use(ElementPlus);
  app.mount('#app');
})();
</script>
</body>
</html>
