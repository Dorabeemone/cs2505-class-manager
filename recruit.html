<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>信息库 - CS2505</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/element-plus"></script>
  <script src="js/auth.js"></script>
  <style>
    :root {
      --primary: #667eea;
      --type-volunteer: #67C23A;
      --type-practice: #409EFF;
      --type-competition: #E6A23C;
      --type-other: #909399;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(160deg, #e8ecf4 0%, #dce2f0 30%, #c8d6e5 60%, #e2e8f0 100%);
      min-height: 100vh;
      background-attachment: fixed;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }

    /* Header */
    .page-header {
      text-align: center;
      padding: 20px 0 8px;
    }
    .page-header h1 {
      font-size: 1.9rem;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }
    .page-header .subtitle {
      color: #7f8c8d;
      font-size: 0.88rem;
      margin-top: 4px;
    }

    /* Card */
    .card {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 18px 20px;
      margin: 14px 0;
      box-shadow: 0 2px 12px rgba(0,0,0,0.03);
      transition: all 0.35s ease;
      border-left: 4px solid var(--primary);
      position: relative;
      overflow: hidden;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.08);
    }

    .card.type-志愿服务 { border-left-color: var(--type-volunteer); }
    .card.type-社会实践 { border-left-color: var(--type-practice); }
    .card.type-文体竞赛 { border-left-color: var(--type-competition); }
    .card.type-其他 { border-left-color: var(--type-other); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .card-title {
      font-weight: 700;
      font-size: 1.05rem;
      color: #2c3e50;
    }
    .card-desc {
      color: #5a6c7d;
      font-size: 0.9rem;
      line-height: 1.6;
      margin: 8px 0;
    }
    .card-contact {
      font-size: 0.82rem;
      color: #909399;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(0,0,0,0.04);
    }

    /* Type tags with colors */
    .type-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #909399;
    }
    .empty-state .empty-icon { font-size: 56px; margin-bottom: 12px; }
    .empty-state p { font-size: 0.95rem; }

    /* Skeleton loading */
    .skeleton {
      background: rgba(255,255,255,0.7);
      border-radius: 16px;
      padding: 18px 20px;
      margin: 14px 0;
      animation: shimmer 1.5s ease-in-out infinite;
    }
    .skeleton .sk-line {
      height: 14px;
      background: linear-gradient(90deg, #e8ecf4 25%, #dce2f0 50%, #e8ecf4 75%);
      background-size: 200% 100%;
      border-radius: 6px;
      animation: shimmer 1.5s ease-in-out infinite;
    }
    .skeleton .sk-line:first-child { width: 55%; margin-bottom: 8px; }
    .skeleton .sk-line:nth-child(2) { width: 85%; margin-bottom: 8px; }
    .skeleton .sk-line:last-child { width: 30%; height: 10px; }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Back link */
    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 24px;
      color: #7f8c8d;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--primary); }

    /* Auth bar */
    .auth-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      padding: 6px 0 2px;
      font-size: 0.84rem;
      color: #606266;
    }
    .auth-bar .user-info {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(6px);
      padding: 4px 12px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    @media (max-width: 480px) {
      .page-header h1 { font-size: 1.5rem; }
      .card { padding: 14px 16px; }
      .auth-bar { justify-content: center; }
    }
  </style>
</head>
<body>
  <div id="app" class="container">
    <div class="auth-bar" v-if="!authLoading">
      <template v-if="AuthState.user">
        <span class="user-info">
          👤 {{ AuthState.user.email }}
          <el-tag v-if="AuthState.user?.is_admin" size="small" type="warning">管理员</el-tag>
        </span>
        <el-button size="small" text @click="doLogout">退出</el-button>
      </template>
      <template v-else>
        <a href="login.html?redirect=recruit.html" style="text-decoration:none;">
          <el-button size="small" type="primary" plain>🔑 登录</el-button>
        </a>
      </template>
    </div>
    <div class="page-header">
      <h1>📢 信息库</h1>
      <p class="subtitle">招募信息 · 活动发布 · 资源汇总</p>
    </div>

    <!-- Loading -->
    <div v-if="loading">
      <div class="skeleton" v-for="i in 3" :key="i">
        <div class="sk-line"></div>
        <div class="sk-line"></div>
        <div class="sk-line"></div>
      </div>
    </div>

    <!-- Empty -->
    <div v-else-if="recruits.length === 0" class="empty-state">
      <div class="empty-icon">📭</div>
      <p>暂无招募信息</p>
    </div>

    <!-- Card list -->
    <div v-for="r in recruits" :key="r.id" class="card" :class="'type-'+r.type">
      <div class="card-header">
        <span class="card-title">{{ r.title }}</span>
        <span class="type-tag" :style="typeStyle(r.type)">{{ typeIcon(r.type) }} {{ r.type }}</span>
      </div>
      <p class="card-desc">{{ r.description }}</p>
      <div class="card-contact">
        📞 {{ r.contact || '暂无联系方式' }}
      </div>
    </div>

    <a href="index.html" class="back-link">← 返回主页</a>
  </div>

  <script>
    const { createApp, ref, onMounted } = Vue;
    createApp({
      setup() {
        const sb = window.AuthActions.supabase;
        const recruits = ref([]);
        const loading = ref(true);
        const authLoading = ref(true);

        const doLogout = () => {
          AuthActions.logout();
        };

        const typeColors = {
          '志愿服务': { bg: '#f0f9eb', color: '#67C23A' },
          '社会实践': { bg: '#ecf5ff', color: '#409EFF' },
          '文体竞赛': { bg: '#fef3e2', color: '#E6A23C' },
          '其他': { bg: '#f4f4f5', color: '#909399' }
        };
        const typeIcons = { '志愿服务':'🤝', '社会实践':'🔬', '文体竞赛':'🏆', '其他':'📋' };

        const typeStyle = (type) => typeColors[type] || typeColors['其他'];
        const typeIcon = (type) => typeIcons[type] || '📋';

        onMounted(() => {
          authLoading.value = false;
          loading.value = true;
          try {
            const { data, error } = await sb.from('recruitments').select('*').order('created_at',{ascending:false});
            if (error) { ElementPlus.ElMessage.error('加载失败'); return; }
            if (data) recruits.value = data;
          } catch (e) {
            ElementPlus.ElMessage.error('网络错误，请刷新重试');
          } finally {
            loading.value = false;
          }
        });

        return { AuthState, authLoading, doLogout, recruits, loading, typeStyle, typeIcon };
      }
    }).use(ElementPlus).mount('#app');
  </script>
</body>
</html>
